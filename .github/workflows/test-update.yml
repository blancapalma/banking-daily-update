name: Test update index

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 1-5"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update index.html
        run: |
          NOW=$(TZ='Europe/Madrid' date +'%Y-%m-%d %H:%M:%S %Z')
          mkdir -p archivo

          cat > index.html <<EOF
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Prueba automática banking daily update</title>
          </head>
          <body style="font-family: Calibri, Arial, sans-serif; margin: 40px;">
            <h1>Prueba de actualización automática</h1>
            <p>Este archivo ha sido actualizado automáticamente por GitHub Actions.</p>
            <p><strong>Última actualización:</strong> $NOW</p>
          </body>
          </html>
          EOF

          cp index.html archivo/test-auto.html

      - name: Commit and push changes
        run: |
          git config user.name "github-actions-bot"
          git config user.email "github-actions-bot@users.noreply.github.com"
          git add index.html archivo/test-auto.html
          git commit -m "Test actualización automática $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
